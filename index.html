.qty-box {

.home-back {

.home-link {

.summary-item {

/* 購入リストと合計の間の太い線 */

/* 合計 */
.summary-total {

/* 特典を横並びに */

}

const groups = ["本部","交際部","管理部","強行部","交渉部","特務部"];

const backGroupItems = [

// 汎用：単純リスト（ブラインド・オープン）
function createSimpleList(containerId, list, area) {
  const container = document.getElementById(containerId);

  list.forEach(([name, price]) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-left">${name}</div>

      <div class="item-right">
        <span class="price">¥${price.toLocaleString()}</span>

        <div class="qty-box">
          <button class="qty-btn minus">−</button>
          <input type="number" value="0" min="0"
            data-price="${price}" data-area="${area}">
          <button class="qty-btn plus">＋</button>
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}


// 前半キャラ別（21種）
function createFrontCharSection(containerId, items, area) {
  const container = document.getElementById(containerId);

  characters21.forEach(charName => {
    const acc = document.createElement("div");
    acc.className = "accordion";
    acc.textContent = charName;

    const panel = document.createElement("div");
    panel.className = "panel";

    items.forEach(([name, price]) => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="item-left">${name}</div>

        <div class="item-right">
          <span class="price">¥${price.toLocaleString()}</span>

          <div class="qty-box">
            <button class="qty-btn minus">−</button>
            <input type="number" value="0" min="0"
              data-price="${price}" data-area="${area}">
            <button class="qty-btn plus">＋</button>
          </div>
        </div>
      `;

      panel.appendChild(div);
    });

    acc.addEventListener("click", () => {
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });

    container.appendChild(acc);
    container.appendChild(panel);
  });
}


// 後半キャラ別（22種：21キャラは4商品＋証明写真、レアは証明写真のみ）
function createBackCharSection(containerId, area) {
  const container = document.getElementById(containerId);
  const [photoName, photoPrice] = backCharPhotoItem;

  // 21キャラ
  characters21.forEach(charName => {

    backCharCommonItems.forEach(([name, price]) => {

      div.innerHTML = `

        <div class="item-right">

    photoDiv.innerHTML = `

    <div class="item-right">
      <span class="price">¥${photoPrice.toLocaleString()}</span>

function createBackGroupSection(containerId, area) {
  const container = document.getElementById(containerId);

  groups.forEach(groupName => {
    const acc = document.createElement("div");
    acc.className = "accordion";
    acc.textContent = groupName;

    const panel = document.createElement("div");
    panel.className = "panel";

    backGroupItems.forEach(([name, price]) => {
      let finalPrice = typeof price === "function"
        ? price(groupName)
        : price;

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="item-left">${name}</div>
        <div class="item-right">
          <span class="price">¥${finalPrice.toLocaleString()}</span>
          <div class="qty-box">
            <button class="qty-btn minus">−</button>
            <input type="number" value="0" min="0"
              data-price="${finalPrice}" data-area="${area}">
            <button class="qty-btn plus">＋</button>
          </div>
        </div>
      `;

      panel.appendChild(div);
    });

    acc.addEventListener("click", () => {
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });

    container.appendChild(acc);
    container.appendChild(panel);
  });

// 描画実行

createBackCharSection("back-characters", "back");
createBackGroupSection("back-open-6", "back");
createSimpleList("back-open", backOpenItems, "back");

// 計算
function calcTotals() {
  let front = 0;
  let back = 0;


  document.querySelectorAll("input[type='number']").forEach(input => {
    const price = Number(input.dataset.price || 0);
    const qty = Number(input.value || 0);
    const area = input.dataset.area;
    if (area === "front") front += price * qty;
    if (area === "back") back += price * qty;
  });

  const total = front + back;

  document.getElementById("sum-front").textContent = `前半：${front.toLocaleString()}円`;
  document.getElementById("sum-back").textContent = `後半：${back.toLocaleString()}円`;
  document.getElementById("sum-total").textContent = `合計：${total.toLocaleString()}円`;

  const bonus3000 = Math.floor(total / 3000);
  const bonus7000 = total >= 7000 ? 1 : 0;

  document.getElementById("bonus-3000").textContent = `3000円毎特典：${bonus3000}枚`;
	const bonus7000Clear = total >= 7000 ? "クリア！" : "未達成";
	document.getElementById("bonus-7000").textContent = `7000円以上特典：${bonus7000Clear}`;

}

document.addEventListener("input", calcTotals);
calcTotals();

// リセット
document.getElementById("resetBtn").addEventListener("click", () => {
  document.querySelectorAll("input[type='number']").forEach(input => {
    input.value = 0;
  });
  calcTotals();
});

// ＋／−ボタンで個数を増減（★ここが追加部分★）
document.addEventListener("click", (e) => {
  if (!e.target.classList.contains("qty-btn")) return;

  const isPlus = e.target.classList.contains("plus");
  const isMinus = e.target.classList.contains("minus");

  const item = e.target.closest(".item");
  const input = item.querySelector("input[type='number']");

  let value = Number(input.value || 0);

  if (isPlus) value++;
  if (isMinus && value > 0) value--;

  input.value = value;

  // 合計再計算
  input.dispatchEvent(new Event("input", { bubbles: true }));
});

  // 商品一覧

    const qty = Number(input.value);
    if (qty > 0) {
      const name = input.closest(".item").querySelector(".item-left").textContent;
      const price = Number(input.dataset.price);
      summary.innerHTML += `
        <div class="summary-item">
          ${name} × ${qty}（¥${(price * qty).toLocaleString()}）
        </div>
      `;
    }
  });

  // 太線
  summary.innerHTML += `<div class="summary-divider"></div>`;

  // 合計
  const total = document.getElementById("sum-total").textContent;
  summary.innerHTML += `<div class="summary-total">${total}</div>`;

  // 特典（横並び）
  const bonus3000 = document.getElementById("bonus-3000").textContent;
  const bonus7000 = document.getElementById("bonus-7000").textContent;

  summary.innerHTML += `
    <div class="summary-bonus-wrap">
      <div class="summary-bonus">${bonus3000}</div>
      <div class="summary-bonus">${bonus7000}</div>
    </div>
  `;

  // 画像化
  html2canvas(summary, { scale: 2 }).then(canvas => {
    summary.style.display = "none";
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "brmy2nd_memo.png";
    link.click();
  });
});




</script>

</body>
</html>
